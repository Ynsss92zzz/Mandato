name: Sequences Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call sequences cron endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://mandato-app-delta.vercel.app/api/cron/sequences)
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Cron endpoint returned non-200 status: $response"
            exit 1
          fi
